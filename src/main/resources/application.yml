spring:
  application:
    name: notes-vault

  mvc:
    problemdetails:
      enabled: true

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/notesvault}
    username: ${DATABASE_USERNAME:notesvault}
    password: ${DATABASE_PASSWORD:notesvault}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  threads:
    virtual:
      enabled: true

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true

logging:
  structured:
    format:
      console: ecs
  level:
    com.bluestaq.notesvault: INFO
    org.hibernate.SQL: WARN

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

info:
  app:
    name: ${spring.application.name}
    description: Notes Vault API
    version: '@project.version@'
